on: [push, pull_request, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware

      - name: Create release zip
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          BRANCH_NAME_SAFE=$(echo "${BRANCH_NAME}" | sed 's/[^a-zA-Z0-9_.-]/-/g')
          
          case "${BRANCH_NAME}" in
            "right_left") ZIP_NAME="mtk64ebt_Right_Left.zip" ;;
            "right_left_foot") ZIP_NAME="mtk64ebt_Right_Left_Foot.zip" ;;
            "right_left_dongle") ZIP_NAME="mtk64ebt_Right_Left_Dongle.zip" ;;
            "right_left_dongle-display") ZIP_NAME="mtk64ebt_Right_Left_Dongle_display.zip" ;;
            "right_left_dongle-display_foot") ZIP_NAME="mtk64ebt_Right_Left_Dongle_disp_foot.zip" ;;
            "right_left_left-ball") ZIP_NAME="mtk64ebt_Right_Left_leftball.zip" ;;
            "right_left_dongle-display_left-ball") ZIP_NAME="mtk64ebt_Right_Left_Dongle_disp_leftball.zip" ;;
            "right_left_dongle-mdbt50q_rx") ZIP_NAME="mtk64ebt_Right_Left_Dongle-mdbt50q_rx.zip" ;;
            "right_left_left-ball_rev3.0") ZIP_NAME="mtk64ebt_Right_Left_leftball_rev3.0.zip" ;;
            "right_left_dongle-display_left-ball_rev3.0") ZIP_NAME="mtk64ebt_Right_Left_Dongle_disp_leftball_rev3.0.zip" ;;
            *) ZIP_NAME="mtk64ebt_${BRANCH_NAME_SAFE}.zip" ;;
          esac
          
          cd firmware
          zip -r "../${ZIP_NAME}" .
          cd ..
          
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "TAG_NAME=latest-${BRANCH_NAME_SAFE}" >> $GITHUB_ENV

      - name: Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.TAG_NAME }}
          allowUpdates: true
          removeArtifacts: true
          artifacts: "${{ env.ZIP_NAME }}"
          body: "Automated pre-built firmware for mtk64ebt (${{ github.ref_name }} branch)"
          name: "Latest Firmware (${{ github.ref_name }})"
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}

